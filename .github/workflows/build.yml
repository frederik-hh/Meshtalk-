name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build PWA (if needed)
        run: npm run build || echo "No build script, using root files"

      - name: Copy PWA files into Android assets
        run: |
          # Create assets folder
          mkdir -p android/app/src/main/assets
          # Copy root .html and .js files (adjust as needed)
          cp -v *.html android/app/src/main/assets/ 2>/dev/null || true
          cp -v *.js android/app/src/main/assets/ 2>/dev/null || true
          cp -v *.css android/app/src/main/assets/ 2>/dev/null || true
          # If dist/ folder exists (e.g., Vite build), copy from there
          if [ -d "dist" ]; then cp -rv dist/* android/app/src/main/assets/; fi
          if [ -d "build" ]; then cp -rv build/* android/app/src/main/assets/; fi
          # Verify
          ls -la android/app/src/main/assets/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download valid gradle-wrapper.jar
        working-directory: android/gradle/wrapper
        run: |
          rm -f gradle-wrapper.jar
          wget https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meshtalk-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk