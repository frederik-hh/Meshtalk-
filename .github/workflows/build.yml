 name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build PWA
        run: |
          npm install
          if npm run | grep -q "build$"; then
            npm run build
          else
            echo "No build script found, will copy source files directly"
          fi

      - name: Copy PWA files into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          find . -maxdepth 1 -type f ! -name ".*" -exec cp -v {} android/app/src/main/assets/ \;
          for dir in css js images fonts assets dist build public src; do
            if [ -d "$dir" ]; then
              cp -rv "$dir" android/app/src/main/assets/
            fi
          done
          if [ -d "dist" ]; then cp -rv dist/* android/app/src/main/assets/ 2>/dev/null || true; fi
          if [ -d "build" ]; then cp -rv build/* android/app/src/main/assets/ 2>/dev/null || true; fi
          echo "=== Assets contents ==="
          ls -laR android/app/src/main/assets/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download valid gradle-wrapper.jar
        working-directory: android/gradle/wrapper
        run: |
          rm -f gradle-wrapper.jar
          wget https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Extract version name from build.gradle.kts
        id: get_version
        working-directory: android/app
        run: |
          VERSION=$(grep 'versionName = ' build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Rename APK with version
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Meshtalk_v${{ env.VERSION }}.apk
          echo "Renamed APK to: Meshtalk_v${{ env.VERSION }}.apk"

      - name: Upload APK (single file)
        uses: actions/upload-artifact@v4
        with:
          name: Meshtalk_v${{ env.VERSION }}
          path: output/Meshtalk_v${{ env.VERSION }}.apk